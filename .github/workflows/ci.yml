name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Lint
        run: |
          go vet ./...
          test -z "$(gofmt -l .)" || (echo "gofmt needed:"; gofmt -l .; exit 1)
      - name: Test
        run: go test -race ./...
      - name: Build
        run: go build ./...
