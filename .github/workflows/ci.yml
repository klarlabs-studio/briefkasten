# Thin caller for the shared klarlabs-studio Go CI bar.
# All gate logic (fmt, golangci-lint w/ gocritic, race tests, coverctl
# coverage gate, nox security scan) lives in the reusable workflow —
# bump versions / add jobs there, once, org-wide.
name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["**.md", "docs/**", "LICENSE"]
  pull_request:
    branches: [main]
    paths-ignore: ["**.md", "docs/**", "LICENSE"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: klarlabs-studio/.github/.github/workflows/go-ci.yml@main
    permissions:
      contents: read
      security-events: write
      pull-requests: write # nox annotate — required by the reusable workflow
    secrets: inherit
    with:
      go-version: "1.26.3" # match go.mod (reusable workflow runs GOTOOLCHAIN=local)
      # The org-pinned golangci-lint v2.7.2 binary is built with go1.25 and
      # refuses to lint a module targeting go1.26.3. v2.12.2 is built with
      # go1.26 and is config-compatible; drop this override once the shared
      # workflow's default catches up.
      golangci-version: "v2.12.2"
      coverage: true
      cross-platform: false # Go library / MCP server — single-platform suffices
