version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - gocritic
    - revive
    - misspell
    - unconvert
    - unparam
    - copyloopvar
  settings:
    errcheck:
      # Writes to the CLI's user-facing streams: a failed Fprint to
      # stdout/stderr has no recovery path.
      exclude-functions:
        - fmt.Fprintln
        - fmt.Fprintf
        - fmt.Fprint
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - whyNoLint
        - unnamedResult
      settings:
        hugeParam:
          # OutboundMessage (112B) passes by value deliberately: the
          # domain treats messages as immutable values.
          sizeThreshold: 256
    revive:
      rules:
        - name: exported
          arguments: ["checkPrivateReceivers"]
        - name: package-comments
        - name: error-strings
        - name: error-naming
        - name: increment-decrement
        - name: indent-error-flow

formatters:
  enable:
    - gofumpt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
